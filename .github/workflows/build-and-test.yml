name: Build & Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: self-hosted
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore CarWashFlow.Platform.sln

      - name: Build
        run: dotnet build CarWashFlow.Platform.sln --configuration Release --no-restore /p:TreatWarningsAsErrors=false /clp:NoSummary

      - name: Test
        run: dotnet test CarWashFlow.Platform.sln --configuration Release --no-build --verbosity minimal --nologo